<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Store - Top Bar</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-left">
                    <p>Get Upto 25% Cashback On First Order: GET25OFF - <a href="#" class="shop-now">SHOP NOW</a></p>
                </div>
                <div class="top-bar-right">
                    <a href="#" class="track-order">Track Order</a>
                    <span class="divider">|</span>
                    <div class="selector language-selector">
                        <img src="https://flagcdn.com/w20/us.png" alt="English" class="flag-icon">
                        <span>English</span>
                        <i class="chevron-down"></i>
                    </div>
                    <span class="divider">|</span>
                    <div class="selector currency-selector">
                        <span>$ USD</span>
                        <i class="chevron-down"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-header">
            <div class="container">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-hand-holding-medical"></i>
                    </div>
                    <h1>Medico</h1>
                </div>

                <div class="search-bar">
                    <div class="category-dropdown">
                        <span>All Categories</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="vertical-divider"></div>
                    <input type="text" placeholder="Search product here...">
                    <button type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <div class="header-contact">
                    <span class="contact-label">Need Help?</span>
                    <span class="phone-number">9876-543-210</span>
                </div>

                <div class="header-icons">
                    <div class="header-icon-item">
                        <i class="far fa-user"></i>
                    </div>
                    <div class="header-icon-item">
                        <i class="far fa-heart"></i>
                        <span class="badge">0</span>
                    </div>
                    <div class="header-icon-item">
                        <i class="fas fa-shopping-basket"></i>
                        <span class="badge">0</span>
                    </div>
                </div>
            </div>
        </div>

    </header>
</body>
</html>
