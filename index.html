<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Store - Top Bar</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-bar">
        <div class="container">
            <div class="top-bar-left">
                <p>Get Upto 25% Cashback On First Order: GET25OFF - <a href="#" class="shop-now">SHOP NOW</a></p>
            </div>
            <div class="top-bar-right">
                <a href="#" class="track-order">Track Order</a>
                <span class="divider">|</span>
                <div class="selector language-selector">
                    <img src="https://flagcdn.com/w20/us.png" alt="English" class="flag-icon">
                    <span>English</span>
                    <i class="chevron-down"></i>
                </div>
                <span class="divider">|</span>
                <div class="selector currency-selector">
                    <span>$ USD</span>
                    <i class="chevron-down"></i>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
